name: Run InstaBot

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'
        
    - name: Install global packages
      run: npm install -g rimraf typescript
      
    - name: Install dependencies
      run: npm install
      
    - name: Start the Bot
      run: node index.js
